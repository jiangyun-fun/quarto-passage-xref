version: 2
updates:
  # Keep GitHub Actions in .github/workflows current (e.g. pages.yml).
  # The extension itself is a Lua filter with no package dependencies.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
